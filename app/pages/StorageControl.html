<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления Хранилищем LT-Plex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ==========================================================================
           1. СБРОС И БАЗОВЫЕ СТИЛИ (Из твоего примера)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            user-select: none;
            box-sizing: border-box;
        }

        @font-face {
            font-family: "Plex-font";
            src: url("/s/fonts/GoogleSansCode-Bold.ttf");
        }

        body {
            width: 100vw;
            min-height: 100vh;
            background-color: #121212;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ==========================================================================
           2. ОСНОВНОЙ КОНТЕЙНЕР (ГЕОМЕТРИЯ МАКЕТА)
           ========================================================================== */
        .dashboard-container {
            width: 100%;
            max-width: 1200px;
            background-color: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: solid rgba(255, 255, 255, 0.1) 2px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            padding: 40px;
        }

        /* Шапка */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .dashboard-title {
            color: white;
            font-family: "Plex-font", sans-serif;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .storage-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 500;
        }

        /* Главная рабочая зона (Сетка как на скрине) */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 30px;
        }

        /* ==========================================================================
           3. ОКНО ПРОСМОТРА ХРАНИЛИЩА (Центральная панель)
           ========================================================================== */
        .storage-viewer {
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        /* Иконка "Пусто" (Запрещающий знак из макета) */
        .empty-icon {
            width: 70px;
            height: 70px;
            border: 5px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: relative;
            margin-bottom: 20px;
            transform: rotate(-45deg);
        }

        .empty-icon::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-50%);
        }

        .empty-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
           4. ПАНЕЛЬ КНОПОК УПРАВЛЕНИЯ (Правая колонка)
           ========================================================================== */
        .control-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn-control {
            width: 100%;
            min-height: 80px; /* Делаем их высокими и массивными как на фото */
            color: rgba(255, 255, 255, 0.85);
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            padding: 15px 20px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Эффекты ховера в стиле твоего примера */
        .btn-control:hover {
            color: white;
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-control:active {
            transform: scale(0.97);
        }

        /* Кнопка повторного сканирования (чуть выделим её нижнее положение) */
        .btn-scan {
            margin-top: auto; /* Прижимается к низу, если контейнер вытянется */
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* ==========================================================================
           5. АДАПТИВНОСТЬ ДЛЯ МОБИЛОК
           ========================================================================== */
        @media (max-width: 768px) {
            .dashboard-container {
                padding: 20px;
            }
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .storage-viewer {
                min-height: 300px;
            }
            .btn-control {
                min-height: 65px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1 class="dashboard-title">Панель управления Хранилищем LT-Plex</h1>
            <div class="storage-info">Доступно место на устройстве : 250gb</div>
        </header>

        <div class="dashboard-grid">
            
            <main class="storage-viewer" id="storageDisplay">
                <div class="empty-icon"></div>
                <div class="empty-text">Хранилище пусто</div>
            </main>

            <nav class="control-sidebar">
                <button class="btn-control" id="btnCreate">Создать Пакет</button>
                <button class="btn-control" id="btnUpload">Загрузить пакет</button>
                <button class="btn-control btn-scan" id="btnScan">Повторить Сканирование</button>
            </nav>

        </div>
    </div>

    <script>
        // Объявление функций, которые ты просил связать
        function scanStorage() {
            console.log("Вызвана функция: scanStorage()");
            // Сюда пойдет логика сканирования хранилища
        }

        function createLTpack() {
            console.log("Вызвана функция: createLTpack()");
            // Сюда пойдет логика создания пакета
        }

        function uploadLTpack() {
            console.log("Вызвана функция: uploadLTpack()");
            // Сюда пойдет логика загрузки пакета
        }

        // Ждем полной загрузки DOM дерева
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. Автоматический запуск сканирования при заходе на страницу
            scanStorage();

            // 2. Привязка обработчиков клика к кнопкам по их ID
            document.getElementById("btnCreate").addEventListener("click", createLTpack);
            document.getElementById("btnUpload").addEventListener("click", uploadLTpack);
            document.getElementById("btnScan").addEventListener("click", scanStorage);
        });
    </script>
</body>
</html>
