<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления Хранилищем LT-Plex</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="/s/css/StorageControl.css">
    <script src="/s/js/jszip.min.js"></script>
</head>
<body>
    <button id="back">Назад</button>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1 class="dashboard-title">Панель управления Хранилищем LT-Plex</h1>
            <div class="storage-info">Доступно место на устройстве : --</div>
        </header>

        <div class="dashboard-grid">
            
            <main class="storage-viewer" id="storageDisplay">
                <div class="empty-icon"></div>
                <div class="empty-text">Хранилище пусто</div>
            </main>

            <nav class="control-sidebar">
                <button class="btn-control" id="btnCreate">Создать Пакет</button>
                <button class="btn-control" id="btnUpload">Загрузить пакет</button>
                <button class="btn-control btn-scan" id="btnScan">Повторить Сканирование</button>
            </nav>

        </div>
    </div>
    <div id="storageOverlay" class="storage-modal">
        <div class="modal-body">
            <div class="modal-header">
                <h3 id="drawerTitle">Просмотр</h3>
                <button id="closeDrawer" class="btn-close">&times;</button>
            </div>
            <div id="drawerContent" class="modal-content">
                </div>
        </div>
    </div>
    
    <script src="/s/js/StorageControl.js"></script>
</body>
</html>
