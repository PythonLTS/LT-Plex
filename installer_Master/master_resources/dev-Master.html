<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/resources/style.css">
    <title>LT-Plex Installer</title>
</head>
<body>
    <div class="progress-dots"></div>

    <div class="container-main">
        <h1 class="title-window">Добро пожаловать!</h1>
        <h2 class="subtitle-window">Настройте под себя Приложение, для комфортного просмотра всякого и вся :3</h2>

        <div class="container-next-prev">
            <button class="buttons-next-prev btn-next">Далее</button>
        </div>
    </div>

    <div style="display: none;" class="container-languageSelect">
        <h1 class="title-window">Выбор языка</h1>
        <h2 class="subtitle-window">Язык можно будет поменять в самом приложении</h2>

        <div class="langs-mini-container">
            <button id="rus">Русский</button>
            <button id="en">English</button>
        </div>

        <div class="container-next-prev">
            <button class="buttons-next-prev btn-next">Далее</button>
            <button class="buttons-next-prev btn-prev">Назад</button>
        </div>
    </div>
    
    <div style="display: none;" class="container-Updater">
        <h1 class="title-window">Проверка Обновлений</h1>
        
        <div>
            </div>

        <div class="container-next-prev">
            <button class="buttons-next-prev btn-next">Далее</button>
            <button class="buttons-next-prev btn-prev">Назад</button>
            <button id="retry-update-search">Повторить проверку</button>
        </div>
    </div>
    
    <div style="display: none;" class="container-NetworkParam">
        <h1 class="title-window">Параметры Сети</h1>
        <h2 class="subtitle-window">Плюшки от LTeam :3</h2>

        <div class="container-next-prev">
            <button class="buttons-next-prev btn-next">Далее</button>
            <button class="buttons-next-prev btn-prev">Назад</button>
        </div>
    </div>

    <div style="display: none;" class="container-RuntimeParam">
        <h1 class="title-window">Параметры Запуска</h1>
        <h2 class="subtitle-window">Запускать ли автоматически приложение при запуске устройства?</h2>
        <div class="container-next-prev">
            <button class="buttons-next-prev btn-next">Далее</button>
            <button class="buttons-next-prev btn-prev">Назад</button>
        </div>
    </div>

    <div style="display: none;" class="container-storage-control">
        <div class="container-next-prev">
            <button class="buttons-next-prev btn-next">Далее</button>
            <button class="buttons-next-prev btn-prev">Назад</button>
        </div>
    </div>

    <div style="display: none;" class="final">
        </div>

    <script src="/resources/script.js"></script>
</body>
</html>
