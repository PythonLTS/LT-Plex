<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LT-Plex Setup Wizard</title>
<link rel="stylesheet" href="/resources/style.css">

</head>

<body>
<div class="container">

  <div class="topbar">
    <div class="dots">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <div class="dot" id="d4"></div>
      <div class="dot" id="d5"></div>
    </div>

    <button onclick="toggleTheme()">Theme</button>
  </div>

  <!-- STEP 1 -->
  <div id="step-welcome" class="card">
    <h1>Добро пожаловать</h1>
    <p>Мастер установки поможет настроить приложение.</p>
    <button onclick="next('lang')">Начать</button>
  </div>

  <!-- STEP 2 -->
  <div id="step-lang" class="card hidden">
    <h1>Выбор языка</h1>
    <button onclick="setLang('ru')">Русский</button>
    <button onclick="setLang('en')">English</button>
  </div>

  <!-- STEP 3 -->
  <div id="step-update" class="card hidden">
  <h1>Проверка обновлений</h1>
  <p id="updateText">Проверяем...</p>
  <div id="loader" class="hidden">
      <div class="spinner"></div>
      <p>Обновление...</p>
  </div>
  <div id="success" class="hidden">
      <div class="checkmark">✔</div>
      <p>Обновление завершено</p>
    </div>
  <div id="updateBtns" class="buttons-group hidden">
    <button id="btn-retry" onclick="checkUpdate()">Повторить</button>
    <button id="btn-apply" onclick="applyUpdate()">Обновить</button>
    <button id="btn-skip" class="secondary" onclick="next('features')">Продолжить</button>  
  </div>
</div>

  <!-- STEP 4 -->
  <div id="step-features" class="card hidden">
  <h1>Дополнения</h1>

  <div class="settings-group">
    <label class="toggle-label">
      <span>DNS (ltplex.com вход)</span>
      <input type="checkbox" id="dns" class="toggle-input">
      <div class="toggle-switch"></div>
    </label>
    
    <label class="toggle-label">
      <span>smartPlex (SmartTV)</span>
      <input type="checkbox" id="smart" class="toggle-input">
      <div class="toggle-switch"></div>
    </label>
    
    <label class="toggle-label">
      <span>Автозапуск</span>
      <input type="checkbox" id="autostart" class="toggle-input">
      <div class="toggle-switch"></div>
    </label>
  </div>
  <div class="buttons-group">
    <button class="action-btn secondary" onclick="prev()">Назад</button>
    <button class="action-btn" onclick="next('finish')">Далее</button>
  </div>
</div>

  <!-- STEP 5 -->
  <div id="step-finish" class="card hidden">
    <h1>Готово</h1>
    <p>Настройка завершена.</p>
  </div>

</div>


    <script src="/resources/script.js"></script>
</body>
</html>
