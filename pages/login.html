<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sign in</title>
    <link rel="stylesheet" href="/s/css/style_log.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="intro-container">
        <p id="main-intro">Plex<br>Welcome back!</p>
    </div>

    <div id="Notification" style="display:none;"></div>

    <div id="main-container">
        <div id="login-side">
            <div id="main-inputs">
                <input type="text" id="user" placeholder="Введите ник">
                <input type="password" id="pass" placeholder="Введите Пароль">
            </div>
            <div id="main-buttons">
                <button id="Login">Войти</button>
                <button id="Back">Назад</button>
            </div>
        </div>

        <div id="qr-side">
            <div id="qr-box">
                <img src="/qrdata/" alt="QR Code">
                <p>Отсканируйте QR-код с телефона<br>где уже выполнен вход<br>чтобы войти мгновенно.</p>
            </div>
        </div>
    </div>
    <script src="/s/js/script_log.js"></script>
</body>
</html>
