<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/s/css/style_reg.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
</head>
<body>
    <div id="intro-container">
        <p id="main-intro">Plex Login</p>
    </div>
    <div id="Notification" style="display:none;"></div>
    <div id="main-container">
        <div id="main-inputs">
            <input type="text" id="user" placeholder="Введите Имя">
            <input type="password" id="pass" placeholder="Придумайте Пароль">
        </div>

        <div id="main-buttons">
            <button id="Login">Регистрация</button>
            <button id="Sign-in">Уже есть аккаунт</button>
        </div>
        <div id="license">
            <input type="checkbox" id="checkBox">
            <a href="/l/" id="link">Принять Лицензионное Соглашение</a>
        </div>
    </div>
    <script src="/s/js/script_reg.js"></script>
</body>
</html>
